version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 20
    versioning-strategy: increase
    # Wait for new releases to age before opening PRs.
    # Matches the pnpm `minimum-release-age` supply-chain policy so auto-merged
    # bumps don't land in the lockfile faster than the policy allows.
    cooldown:
      default-days: 1
      semver-major-days: 1
      semver-minor-days: 1
      semver-patch-days: 1
    labels:
      - dependencies
    commit-message:
      prefix: chore
      prefix-development: chore
      include: scope
    ignore:
      # eslint-config-next pulls in eslint-plugin-react, whose latest release
      # (7.37.5) does not support ESLint 10 (it uses the removed
      # context.getFilename() API). Block ESLint major bumps until upstream
      # adds ESLint 10 support.
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
    groups:
      next:
        patterns:
          - "next"
          - "eslint-config-next"
          - "@next/*"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
          - "prettier-plugin-tailwindcss"
      testing:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "@vitejs/plugin-react"
          - "@testing-library/*"
          - "jsdom"
      linting:
        patterns:
          - "eslint"
          - "eslint-*"
          - "prettier"
          - "@commitlint/*"
          - "lint-staged"
          - "husky"
      types:
        patterns:
          - "@types/*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 10
    cooldown:
      default-days: 1
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: ci
      include: scope
